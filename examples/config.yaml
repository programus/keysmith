# KeySmith example configuration.
#
# Place this at one of:
#   - $KEYSMITH_CONFIG_FILE  (whatever path)
#   - ~/.config/keysmith/config.yaml
#   - ~/.keysmith.yaml
#
# Or pass explicitly with `keysmith --config /path/to/config.yaml ...`.
#
# All configuration keys use kebab-case (e.g. `open-delay` not
# `open_delay`). KeySmith rejects unknown keys with a helpful error
# rather than silently ignoring typos.

device:
  # Optional. If omitted (or set to a glob like /dev/cu.usbmodem*), the
  # CLI auto-discovers by sending PING to candidate USB CDC devices.
  # port: /dev/cu.usbmodem8401

  # Optional. Default 115200. Must match the firmware's Serial.begin().
  baud: 115200

  # Optional. Default 0.05 seconds. Time to wait after opening the
  # serial port before sending the first byte.
  #
  # Most third-party Pro Micro clones don't reset on DTR toggle and
  # respond essentially immediately, so 0.05 is plenty.
  #
  # If you have a stock SparkFun Pro Micro or Arduino Leonardo whose
  # Caterina bootloader resets on DTR toggle, you'll see PING failures
  # at this default — bump it to 2.0 or so:
  #   open-delay: 2.0
  open-delay: 0.05

actions:
  # Unlock the screen by triggering a Karabiner-Elements rule keyed on
  # International3 (HID 0x89), which Karabiner translates into your
  # password + Enter.
  #
  # Why three steps and not just one tap?
  # When the display has been asleep for a while macOS suspends the HID
  # event delivery path that Karabiner's virtual keyboard listens on, so
  # the very first key after wake doesn't get processed by Karabiner —
  # it leaks through as a bare HID code. By the time the second key
  # arrives (~1-2s later), Karabiner is fully re-grabbed and ready.
  #
  # Step-by-step:
  #   1. tap right-shift — wakes the display. right-shift is harmless
  #      on the lock screen (the password field ignores modifier-only
  #      events), so even if it leaks through nothing bad happens.
  #   2. delay 2.0 — give Karabiner time to re-grab the device and
  #      restart its event monitor. ~1.5s is usually enough; 2.0s adds
  #      a safety margin. Increase if your setup is flakier.
  #   3. tap international3 — triggers the Karabiner rule that types
  #      your password and presses Enter, unlocking the session.
  unlock:
    - tap: right-shift
    - delay: 2.0
    - tap: international3

  # Harmless smoke-test: right shift on its own does nothing visible
  # to most apps but appears in Karabiner's EventViewer, so it's a good
  # check that the HID path is alive.
  test:
    - tap: right-shift

  # Example combo: cmd + space (macOS Spotlight).
  spotlight:
    - press: cmd
    - tap: space
    - release: cmd

  # Example with timing: press shift, wait, release.
  long-shift:
    - press: shift
    - delay: 0.5
    - release: shift

# ---- Available step types ----------------------------------------------
#
#   - press: <key>           Press a key without releasing.
#   - release: <key>         Release a previously pressed key.
#   - tap: <key>             Press + brief hold + release (most common).
#   - delay: <float>         Sleep N seconds before the next step.
#   - release-all: true      Emergency: release every held key.
#
# `delay-ms: <int>` (integer milliseconds) is also accepted as a deprecated
# spelling for compatibility with v0.1 configs, but new configs should use
# `delay` (seconds, float).
#
# ---- Key reference -----------------------------------------------------
#
# `<key>` accepts any of these forms:
#   - Friendly alias (case- and separator-insensitive — kebab and snake
#     forms are interchangeable; this file uses kebab-case to match the
#     YAML key style):
#       international3 == International3 == intl3
#       right-shift    == right_shift    == "right shift" == rshift
#   - Hex string: 0x89
#   - Decimal (>= 10): 137
#
# See ../host/README.md for the complete alias table grouped by HID
# usage page (letters, function keys, modifiers, international, etc.).
