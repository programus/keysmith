; KeySmith firmware — SparkFun Pro Micro / Arduino Leonardo (ATmega32U4)
;
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor

[env:promicro]
platform = atmelavr
board = leonardo
framework = arduino

; The clone board self-identifies as "Arduino Leonardo" (VID 0x2341 PID 0x8036),
; so we use the leonardo board profile. Functionally identical to
; sparkfun_promicro16 for ATmega32U4 @ 16MHz.

upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*
monitor_speed = 115200

lib_deps =
    NicoHood/HID-Project@^2.8.2

build_flags =
    -DKEYSMITH_PROTOCOL_VERSION=1
